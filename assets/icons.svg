  </symbol>

  <symbol id="alpine-legend" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="6" cy="7" r="2" fill="#3ddc84" stroke="none" />
    <circle cx="6" cy="12" r="2" fill="#ffb020" stroke="none" />
    <circle cx="6" cy="17" r="2" fill="#ef4444" stroke="none" />
    <path d="M11 7h9M11 12h7M11 17h5" fill="none" stroke="currentColor" stroke-width="1.75" />
  </symbol>

  <symbol id="alpine-explore" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
