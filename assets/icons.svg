<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="alpine-compass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9" />
    <path d="M12 4.5 13.5 12 10.5 12Z" fill="currentColor" />
    <path d="M10.5 12 12 19.5 13.5 12" />
  </symbol>

  <symbol id="alpine-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 21s6-5.5 6-11a6 6 0 0 0-12 0c0 5.5 6 11 6 11Z"/>
    <circle cx="12" cy="10" r="2"/>
  </symbol>

  <symbol id="alpine-route" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
