# Runs cargo fmt --check + cargo build + cargo test + npm test on every push
# to main and every PR targeting main. npm test transitively runs
# verify-wasm-hash (committed artifact integrity) and check-wasm-size (size
# budget), so the committed WASM is verified without a full rebuild.
#
# The WASM rebuild verification (rebuild + diff against committed artifacts
# to catch stale binaries) lives in a separate workflow (`wasm-verify.yml`)
# that fires only when Rust sources or build tooling change.

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Pinned to 1.93.1 so rustfmt output is deterministic across local
        # contributor machines and CI runners. Bump in lockstep when local
        # contributors upgrade.
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --package leisure-core -- --check

      - name: Build check
        run: cargo build --package leisure-core

      - name: Rust tests
        run: cargo test --package leisure-core --tests

      - name: Install binaryen (wasm-opt)
        run: npm install --no-save binaryen

      - name: Node tests
        run: npm test
