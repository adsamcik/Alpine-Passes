    <path d="M7 13l3-3 5 5"/>
  </symbol>

  <symbol id="alpine-reload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18.5 8.5A7 7 0 1 0 19 15"/>
    <path d="M18.5 4.5v4h-4"/>
  </symbol>

  <symbol id="alpine-status" viewBox="0 0 24 24">
